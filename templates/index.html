<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Linux Weather App</title>
        <style>
           html, body {
                margin: 0;
                padding: 0;
                background-color: #0f172a;
                color: #ffffff;
                font-familly: monospace;
                text-align: center;
                min-height: 100vh;

            }

        h1 {
            color: #38bdf8;
            }
            .box {
                
                display: inline-block;
                padding: 25px;
                background-color; #1e293b;
                border-radius: 12px;
                margin-top: 30px;
                font-size: 20px;
            }
             .subtitle {
               color: #cbd5e1;
             }
            .box p {
               color: #ffffff;
               }
            .status {
               margin-top: 20px;
               font-size: 16px;
               color: #22c55e;
            }

             .footer {
                 margin-top: 40px;
                 font-size: 14ps;
                 color: #94a3b8;
              }
  
         </style>
     </head>
     <body> 
        <h1>Linux Weather App</h1>
        <p class="subtitle">Weather data from API (yr.no)</p>
        <p class="subtitle">Bratislava, Slovakia</p>
        
        <div class="box">
            <p>Temperature: {{ temperature }} &deg;C</p>
            <p>Wind: {{ wind}} m/s</p>
            <p>Humidity: {{ humidity}} %</p>


         </div>
        
         <div class="footer">
             Powered by yr.no API | Running on Linux| Built with Flask
         </div>

        </body>
        
</html>
